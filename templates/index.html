<!DOCTYPE html>
<html>
<head>
<title>Password Strength Analyzer</title>
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="container">

<h1>Password Strength Analyzer</h1>

<form method="POST">

<input
type="password"
name="password"
placeholder="Enter Password"
required>

<br><br>

<button type="submit">
Check Password
</button>

</form>

{% if strength %}

<h2>{{ strength }}</h2>

<p>{{ message }}</p>

{% endif %}

</div>

</body>
</html>
